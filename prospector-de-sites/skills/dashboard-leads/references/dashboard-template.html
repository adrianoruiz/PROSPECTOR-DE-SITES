<!DOCTYPE html>
<!-- TEMPLATE DO DASHBOARD (v2) — substituir __DADOS__ pelo JSON (ver SKILL.md). Salvar como dashboard.html na RAIZ da pasta conectada -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospector — Painel</title>
<style>
:root{
 --paper:#F0EEE5;--surface:#FAF9F5;--white:#FFFFFF;--ink:#1F1E1D;--muted:#87837B;--line:#E3DFD5;
 --accent:#D97757;--accent-2:#C15F3C;--accent-soft:#F4E5DE;
 --ok:#6A9B72;--ok-soft:#E7EFE8;--warn:#C98A2D;--warn-soft:#F6ECD9;--cinza:#B7B2A7;
 --novo:#7A8CA8;--rede:#9C7BB8;--pub:#5E9DA8;--prop:#C98A2D;--resp:#6A9B72;--fech:#4E8757;
 --serif:Georgia,'Times New Roman',serif;--sans:-apple-system,'Segoe UI',Roboto,Inter,sans-serif}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);min-height:100vh;display:flex;overflow-x:hidden}
aside{width:232px;min-height:100vh;background:var(--ink);color:#EDEAE3;padding:22px 14px;position:fixed;top:0;bottom:0;display:flex;flex-direction:column}
.logo{display:flex;align-items:center;gap:10px;padding:0 10px 20px;border-bottom:1px solid #3A3835;margin-bottom:16px}
.logo .burst{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff}
.logo b{font-family:var(--serif);font-size:17px;font-weight:600;letter-spacing:.2px}
.logo span{display:block;font-size:10.5px;color:#A8A399;margin-top:1px}
nav{display:flex;flex-direction:column;gap:2px}
nav button{display:flex;align-items:center;justify-content:space-between;gap:8px;background:none;border:0;color:#CFC9BE;font-size:13.5px;font-weight:600;padding:10px 12px;border-radius:9px;cursor:pointer;text-align:left;font-family:var(--sans)}
nav button:hover{background:#33312E;color:#fff}
nav button.on{background:var(--accent);color:#fff}
nav button .qt{font-size:11px;background:#00000030;padding:1px 8px;border-radius:10px}
.side-foot{margin-top:auto;font-size:11px;color:#8B867C;padding:12px 10px;line-height:1.5}
main{margin-left:232px;flex:1;min-width:0;padding:22px 28px 0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#view{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;padding-bottom:14px}
#view>.stats,#view>.painel,#view>.dica-drag,#view>.sites-grid{flex:0 0 auto}
.topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;flex:0 0 auto}
.topbar h1{font-family:var(--serif);font-size:26px;font-weight:600;margin:0;letter-spacing:-.2px}
.topbar .upd{color:var(--muted);font-size:12px}
.busca{margin-left:auto;background:var(--white);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:13.5px;width:250px;color:var(--ink);font-family:var(--sans)}
.busca:focus{outline:2px solid var(--accent);border-color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
.stat{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.stat .n{font-family:var(--serif);font-size:30px;font-weight:600;line-height:1.05}
.stat .l{color:var(--muted);font-size:12px;margin-top:5px;font-weight:600}
.stat.laranja .n{color:var(--accent)}.stat.verde .n{color:var(--fech)}.stat.ambar .n{color:var(--warn)}
.painel{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:20px}
.painel h2{font-family:var(--serif);font-size:17px;margin:0 0 14px;font-weight:600}
.funil .linha{display:grid;grid-template-columns:130px 1fr 40px;align-items:center;gap:12px;margin:9px 0;font-size:12.5px}
.funil .barra{height:22px;border-radius:6px;background:var(--paper);overflow:hidden}
.funil .fill{height:100%;border-radius:6px;min-width:2px}
.fup-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.fup-item:last-child{border:0}
.fup-item .dias{background:var(--warn-soft);color:var(--warn);font-weight:700;font-size:11px;padding:3px 9px;border-radius:12px;white-space:nowrap}
.board{display:flex;gap:14px;overflow-x:auto;align-items:stretch;flex:1;min-height:0;padding-bottom:4px}
.board::-webkit-scrollbar,.cards::-webkit-scrollbar{height:9px;width:9px}
.board::-webkit-scrollbar-thumb,.cards::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.board::-webkit-scrollbar-thumb:hover,.cards::-webkit-scrollbar-thumb:hover{background:var(--cinza)}
.col{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 8px 8px 12px;flex:0 0 272px;width:272px;display:flex;flex-direction:column;min-height:0}
.cards{flex:1;overflow-y:auto;min-height:0;padding-right:6px}
.col>h3{font-size:11.5px;text-transform:uppercase;letter-spacing:.7px;margin:2px 4px 12px;display:flex;justify-content:space-between;color:var(--muted);flex:0 0 auto}
.card{background:var(--white);border:1px solid var(--line);border-top:3px solid var(--cor,var(--accent));border-radius:11px;padding:13px;margin-bottom:10px;box-shadow:0 1px 2px #0000000a}
.card .nm{font-weight:700;font-size:13.5px}
.card .mt{color:var(--muted);font-size:12px;margin:4px 0}
.card .motivo{color:var(--muted);font-size:12px;font-style:italic;margin:7px 0;border-left:2px solid var(--line);padding-left:8px;line-height:1.45}
.acoes{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.acoes a{font-size:11px;font-weight:700;text-decoration:none;padding:4px 10px;border-radius:7px;background:var(--paper);color:var(--accent-2);border:1px solid var(--line)}
.acoes a:hover{background:var(--accent-soft);border-color:var(--accent)}
.tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;margin-left:6px;vertical-align:1px}
.fup{background:var(--warn-soft);color:var(--warn)}
.valor{color:var(--fech);font-weight:800;font-size:13px;margin-top:6px}
select.st{font-size:11.5px;border:1px solid var(--line);border-radius:7px;padding:4px 6px;background:var(--surface);color:var(--ink);font-family:var(--sans);margin-top:9px;width:100%}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:left;padding:9px 10px;border-bottom:2px solid var(--line);cursor:pointer;white-space:nowrap}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:hover td{background:var(--surface)}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;white-space:nowrap}
.painel.tab{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;margin-bottom:0}
.twrap{flex:1;min-height:0;overflow:auto}
.pagin{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px;font-size:12.5px;color:var(--muted);flex:0 0 auto;border-top:1px solid var(--line);padding-top:12px}
.pagin .info{margin-right:auto}
.pagin button{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;font-family:var(--sans)}
.pagin button:hover{border-color:var(--accent);color:var(--accent-2)}
.pagin button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.pagin button:disabled{opacity:.4;cursor:default}
.pagin select{border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:12.5px;background:var(--white);color:var(--ink);font-family:var(--sans)}
.sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.site-card{background:var(--white);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.site-card .prev{height:190px;overflow:hidden;border-bottom:1px solid var(--line);background:var(--paper)}
.site-card iframe{width:200%;height:380px;border:0;transform:scale(.5);transform-origin:0 0;pointer-events:none}
.site-card{display:flex;flex-direction:column;transition:box-shadow .15s,transform .15s}
.site-card:hover{box-shadow:0 6px 18px #00000014;transform:translateY(-2px)}
.site-card .info{padding:14px 16px 12px}
.s-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
.s-nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-sub{color:var(--muted);font-size:12px;margin:3px 0 12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-main{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.s-main a{text-align:center;padding:9px 6px;border-radius:9px;font-size:12.5px;font-weight:700;text-decoration:none}
.s-main .prim{background:var(--accent);color:#fff}
.s-main .prim:hover{background:var(--accent-2)}
.s-main .sec{background:var(--paper);color:var(--ink);border:1px solid var(--line)}
.s-main .sec:hover{border-color:var(--accent);color:var(--accent-2)}
.s-icons{display:flex;border-top:1px solid var(--line);padding-top:9px;margin:0 -4px}
.s-icons a{flex:1;text-align:center;font-size:11.5px;font-weight:600;color:var(--muted);text-decoration:none;padding:5px 2px;border-radius:7px}
.s-icons a:hover{background:var(--paper);color:var(--accent-2)}
.s-icons a.del:hover{color:#B0483B;background:#B0483B14}
.fin-check{width:17px;height:17px;accent-color:var(--fech);cursor:pointer}
select.mini{border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-size:12px;background:var(--surface);color:var(--ink);font-family:var(--sans);cursor:pointer}
.btn-ct{display:inline-block;font-size:12px;font-weight:700;text-decoration:none;padding:6px 12px;border-radius:8px;margin:2px 4px 2px 0;white-space:nowrap}
.btn-ct.ver{background:var(--accent);color:#fff}
.btn-ct.ver:hover{background:var(--accent-2)}
.btn-ct.baixar{background:var(--paper);color:var(--ink);border:1px solid var(--line)}
.btn-ct.baixar:hover{border-color:var(--accent);color:var(--accent-2)}
.btn-ct.ass{background:var(--ok-soft);color:var(--ok)}
.ct-pendente{background:#B7B2A733;color:#6E6A63}.ct-enviado{background:var(--warn-soft);color:var(--warn)}.ct-assinado{background:var(--ok-soft);color:var(--ok)}
#doc-bg{position:fixed;inset:0;background:#000000AA;display:none;z-index:60;flex-direction:column}
#doc-bg.aberto{display:flex}
.doc-bar{display:flex;align-items:center;gap:12px;padding:12px 20px;background:var(--ink);color:#EDEAE3;flex:0 0 auto}
.doc-bar b{font-family:var(--serif);font-size:15px}
.doc-bar .sp{flex:1}
.doc-bar button{border:0;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.doc-bar .imp{background:var(--accent);color:#fff}
.doc-bar .imp:hover{background:var(--accent-2)}
.doc-bar .fech{background:#3A3835;color:#EDEAE3}
#doc-frame{flex:1;border:0;width:100%;background:#E9E7E1}
.vazio{color:var(--muted);font-size:12.5px;text-align:center;padding:14px 4px}
.diag{background:var(--warn-soft);border:1px solid #E8D3AC;border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:#8A6218}
.diag summary{cursor:pointer;font-weight:700;list-style:none}
.diag summary::-webkit-details-marker{display:none}
.diag summary::before{content:'▸ ';font-size:11px}
.diag[open] summary::before{content:'▾ '}
.diag ul{margin:10px 0 0;padding-left:18px}
.diag li{margin-bottom:8px;line-height:1.5}
.diag li b{font-family:var(--sans);font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--warn)}
.diag li i{display:block;font-style:normal;color:#6E6A63;font-size:12px;margin-top:2px}
.card[draggable=true]{cursor:grab}
.card.arrastando{opacity:.45;transform:rotate(1.5deg)}
.col.alvo{outline:2px dashed var(--accent);outline-offset:-4px;background:var(--accent-soft)}
.dica-drag{color:var(--muted);font-size:11.5px;margin:0 0 10px}
.hidden{display:none}
.acoes a.del{color:#B0483B}
/* "novo" = o redesign que fizemos; destacado para separar do "antigo" do cliente */
.acoes a.novo{background:var(--accent);color:#fff;border-color:var(--accent)}
.acoes a.novo:hover{filter:brightness(1.08)}
/* nome do cliente abre o site atual dele */
.nm-link{color:inherit;text-decoration:none;border-bottom:1px dotted var(--line)}
.nm-link:hover{color:var(--accent-2);border-bottom-color:currentColor}
.modo{font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px}
.modo.db{background:var(--ok-soft);color:var(--ok)}
.modo.file{background:var(--warn-soft);color:var(--warn)}
.sw{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--white)}
.sw button{border:0;background:none;padding:7px 12px;font-size:11.5px;font-weight:800;cursor:pointer;color:var(--muted);font-family:var(--sans);border-right:1px solid var(--line)}
.sw button:last-child{border-right:0}
.sw button.on{background:var(--ink);color:#fff}
.sw button.on.us{background:#4A6591}
.sw button.on.br{background:var(--ok)}
.stat .n.duplo{font-size:19px;line-height:1.5}
.tag.us{background:#E4E9F2;color:#4A6591}
.tag.br{background:var(--ok-soft);color:var(--ok)}
#modal-bg{position:fixed;inset:0;background:#00000055;display:none;align-items:center;justify-content:center;z-index:50}
#modal-bg.aberto{display:flex}
#modal{background:var(--white);border-radius:16px;padding:22px;width:460px;max-width:92vw;max-height:88vh;overflow-y:auto}
#modal h2{font-family:var(--serif);font-size:18px;margin:0 0 14px}
#modal label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:10px 0 4px}
#modal input,#modal select,#modal textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;font-family:var(--sans);color:var(--ink);background:var(--surface)}
#modal .mrow{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
#modal .mbot{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
#modal .mbot button{border:0;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans)}
#modal .salvar{background:var(--accent);color:#fff}
#modal .cancelar{background:var(--paper);color:var(--ink)}
@media(max-width:860px){aside{display:none}main{margin-left:0}}
.cmp-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.cmp-tabs button{border:1px solid var(--line);background:var(--white);padding:8px 16px;border-radius:20px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--muted);font-family:var(--sans)}
.cmp-tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1 1 auto;min-height:0}
.cmp-col{display:flex;flex-direction:column;background:var(--white);border:1px solid var(--line);border-radius:14px;overflow:hidden;min-height:0}
.cmp-col .cab{padding:9px 14px;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--line)}
.cmp-col .cab.antes{color:var(--muted)} .cmp-col .cab.depois{color:var(--accent)}
.cmp-col iframe{flex:1 1 auto;width:100%;border:0;min-height:0;background:#fff}
@media(max-width:900px){.cmp-grid{grid-template-columns:1fr}}
.cob-wrap{overflow:auto}
.cob-matriz{border-collapse:separate;border-spacing:4px;font-size:12.5px;width:auto}
.cob-matriz th{border:0;padding:6px 8px;cursor:default}
.cob-matriz th.cid{text-align:right;text-transform:none;letter-spacing:0;font-size:12.5px;color:var(--ink);font-weight:700;white-space:nowrap}
.cob-matriz th.cid span{display:block;color:var(--muted);font-size:10.5px;font-weight:600}
.cob-matriz td{border:0;padding:0}
.cel{display:block;min-width:74px;padding:9px 8px;border-radius:9px;text-align:center;font-size:11.5px;font-weight:700;border:1px solid var(--line)}
.cel.on{background:var(--ok-soft);color:var(--ok);border-color:#CBDDCE}
.cel.off{background:var(--surface);color:var(--cinza)}
.cob-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px 12px;align-items:end}
.cob-form label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.cob-form input,.cob-form select{width:100%;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;font-family:var(--sans);color:var(--ink);background:var(--surface)}
.cob-form button{border:0;border-radius:10px;padding:10px 20px;font-size:13.5px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;font-family:var(--sans)}
.cob-in{width:100%;min-width:62px;border:1px solid transparent;border-radius:7px;padding:5px 7px;font-size:12.5px;font-family:var(--sans);color:var(--ink);background:transparent}
.cob-in:hover{border-color:var(--line);background:var(--surface)}
.cob-in:focus{outline:0;border-color:var(--accent);background:var(--white)}
.cob-in.num{max-width:82px}
</style>
</head>
<body>
<aside>
  <div class="logo"><div class="burst">✳</div><div><b>Prospector</b><span>painel de clientes</span></div></div>
  <nav id="nav"></nav>
  <div class="side-foot">Alimentado pelo plugin <b>prospector-de-sites</b>. Cliente respondeu ou fechou? Conta pro Claude que ele atualiza aqui.</div>
</aside>
<main>
  <div class="topbar"><h1 id="titulo">Visão geral</h1><span class="upd" id="upd"></span><span class="modo file" id="modo" title="Abra pelo iniciar-dashboard.bat para salvar no banco">modo arquivo</span><span class="sw" id="sw-pais" title="Operação: Brasil, Estados Unidos ou tudo junto"></span><span class="sw" id="sw-lang" title="Idioma do painel / Panel language"></span><button id="limpar-ov" style="display:none;border:1px solid var(--line);background:var(--white);color:var(--muted);font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;cursor:pointer;font-family:var(--sans)" onclick="if(confirm('Descartar as edições feitas neste navegador e voltar aos dados do plugin?')){localStorage.removeItem('prospector_ov');localStorage.removeItem('prospector_cob');location.reload()}">limpar edições locais</button><input class="busca" id="busca" placeholder="Buscar cliente, nicho, cidade..."></div>
  <div id="view"></div>
</main>
<div id="doc-bg"><div class="doc-bar"><b id="doc-titulo">Contrato</b><span class="sp"></span><button class="imp" onclick="printDoc()">🖨 Imprimir / Salvar PDF</button><button class="fech" onclick="fecharDoc()">Fechar ✕</button></div><iframe id="doc-frame"></iframe></div>
<div id="modal-bg" onclick="if(event.target===this)fecharEdit()"><div id="modal">
<h2 id="m-titulo">Editar lead</h2>
<label data-t="Nome">Nome</label><input id="m-nome">
<div class="mrow"><div><label data-t="E-mail">E-mail</label><input id="m-email"></div><div><label data-t="Telefone">Telefone</label><input id="m-telefone"></div></div>
<div class="mrow"><div><label data-t="WhatsApp (55DDDnúmero)">WhatsApp (55DDDnúmero)</label><input id="m-whatsapp"></div><div><label data-t="Cidade">Cidade</label><input id="m-cidade"></div></div>
<div class="mrow"><div><label data-t="Nicho">Nicho</label><input id="m-nicho"></div><div><label data-t="Status">Status</label><select id="m-status"></select></div></div>
<div class="mrow"><div><label data-t="País / moeda">País / moeda</label><select id="m-pais"><option value="BR">BR — R$ (real)</option><option value="US">US — US$ (dólar)</option></select></div><div><label data-t="Data da proposta">Data da proposta</label><input id="m-dataProposta" type="date"></div></div>
<div class="mrow"><div><label data-t="Valor">Valor</label><input id="m-valor" type="number" step="50"></div><div><label data-t="Manutenção mensal">Manutenção mensal</label><input id="m-manutencao" type="number" step="10"></div></div>
<div class="mrow"><div><label data-t="Pagamento recebido?">Pagamento recebido?</label><select id="m-pago"><option value="0" data-t="Não">Não</option><option value="1" data-t="Sim">Sim</option></select></div><div><label data-t="Contrato">Contrato</label><select id="m-contratoStatus"><option value="pendente" data-t="Pendente">Pendente</option><option value="enviado" data-t="Enviado">Enviado</option><option value="assinado" data-t="Assinado">Assinado</option></select></div></div>
<div class="mrow"><div><label data-t="Data do contrato">Data do contrato</label><input id="m-contratoEm" type="date"></div><div><label data-t="CPF/CNPJ do cliente">CPF/CNPJ do cliente</label><input id="m-docCliente" placeholder="para o contrato"></div></div>
<label data-t="Endereço do cliente">Endereço do cliente</label><input id="m-endCliente" placeholder="rua, nº — para o contrato">

function T(s){return LANG==='en'&&EN[s]!==undefined?EN[s]:s}
function moe(l){return (l.pais||'BR')==='US'?'US':'BR'}
function fmtMoe(n,p){return p==='US'?'US$ '+(n||0).toLocaleString('en-US'):'R$ '+(n||0).toLocaleString('pt-BR')}
function fmtLead(l,k){return fmtMoe(l[k],moe(l))}
function somaMoe(arr,k){var s={BR:0,US:0};arr.forEach(function(l){s[moe(l)]+=(l[k]||0)});return s}
function statMoe(s,suf){suf=suf||'';if(!s.BR&&!s.US)return fmtMoe(0,PAIS==='US'?'US':'BR')+suf;var a=[];if(s.BR)a.push(fmtMoe(s.BR,'BR')+suf);if(s.US)a.push(fmtMoe(s.US,'US')+suf);return a.join('<br>')}
function tagPais(l){return PAIS==='todos'&&moe(l)==='US'?' <span class="tag us">US</span>':''}
function aplicaOv(arr){return arr.filter(function(l){return !(OV[l.slug]&&OV[l.slug]._del)}).map(function(l){return Object.assign({},l,OV[l.slug]||{})})}

var COBOV=JSON.parse(localStorage.getItem('prospector_cob')||'null');
var cob=COBOV||(D.cobertura||[]);

var DIAG=null;

fetch('/api/leads',{cache:'no-store'}).then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(j){MODE='db';leads=j;recarregaCob();recarregaDiag();fetch('/api/config',{cache:'no-store'}).then(function(r){return r.json()}).then(function(c){CFG=(c&&c.contratante!==undefined)?c.contratante:c;HG=(c&&c.hostgator)||{};if(view==='config')render()});var m=document.getElementById('modo');m.textContent='banco conectado';m.className='modo db';m.title='Alterações salvas no prospector.db';var lb=document.getElementById('limpar-ov');if(lb)lb.style.display='none';render()}).catch(function(){});
var CORES={novo:'var(--novo)',redesenhado:'var(--rede)',publicado:'var(--pub)',proposta:'var(--prop)',respondeu:'var(--resp)',fechado:'var(--fech)',descartado:'var(--cinza)'};
var NOMES={novo:'Novo',redesenhado:'Redesenhado',publicado:'Publicado',proposta:'Proposta enviada',respondeu:'Respondeu',fechado:'Fechado',descartado:'Descartado'};
var ORDEM=['novo','redesenhado','publicado','proposta','respondeu','fechado'];
var view='geral',busca='',sortCol='nome',sortAsc=true,pag=1,porPag='auto';
function pagSize(){if(porPag!=='auto')return porPag;var v=document.getElementById('view');var h=v?v.clientHeight:600;return Math.max(4,Math.floor((h-165)/59))}
document.getElementById('upd').textContent='atualizado em '+(D.atualizado||'—');
function dias(iso){if(!iso)return 0;return Math.floor((Date.now()-new Date(iso+'T12:00:00'))/864e5)}
function ativos(){return fil().filter(function(l){return l.status!=='descartado'})}
function fil(){var b=busca.toLowerCase();return leads.filter(function(l){return (PAIS==='todos'||(l.pais||'BR')===PAIS)&&(!b||((l.nome||'')+(l.nicho||'')+(l.cidade||'')+(l.status||'')).toLowerCase().indexOf(b)>=0)})}
function recarrega(){return fetch('/api/leads',{cache:'no-store'}).then(function(r){return r.json()}).then(function(j){leads=j;render()})}
function salvarOv(slug,ch){
 if(MODE==='db'){fetch('/api/leads/'+encodeURIComponent(slug),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(ch)}).then(recarrega);return}
 OV[slug]=Object.assign(OV[slug]||{},ch);localStorage.setItem('prospector_ov',JSON.stringify(OV));leads=aplicaOv(D.leads||[]);render()}
function deletar(slug){if(!confirm(T('Excluir este lead do painel?')))return;
 if(MODE==='db'){fetch('/api/leads/'+encodeURIComponent(slug),{method:'DELETE'}).then(recarrega);return}
 OV[slug]=Object.assign(OV[slug]||{},{_del:true});localStorage.setItem('prospector_ov',JSON.stringify(OV));leads=aplicaOv(D.leads||[]);render()}
var CFG={};
var editSlug=null;
function abrirEdit(slug){editSlug=slug;var l=leads.filter(function(x){return x.slug===slug})[0]||{};
 document.getElementById('m-titulo').textContent=T('Editar —')+' '+(l.nome||slug);
 document.getElementById('m-status').innerHTML=Object.keys(NOMES).map(function(st){return '<option value="'+st+'"'+(l.status===st?' selected':'')+'>'+T(NOMES[st])+'</option>'}).join('');
 ['nome','email','telefone','whatsapp','cidade','nicho','valor','dataProposta','urlNova','obs','manutencao','contratoEm','docCliente','endCliente'].forEach(function(k){document.getElementById('m-'+k).value=l[k]==null?'':l[k]});
 document.getElementById('m-pago').value=l.pago?1:0;document.getElementById('m-contratoStatus').value=l.contratoStatus||'pendente';
 document.getElementById('m-pais').value=(l.pais||'BR')==='US'?'US':'BR';
 document.getElementById('modal-bg').classList.add('aberto')}
function fecharEdit(){document.getElementById('modal-bg').classList.remove('aberto');editSlug=null}
function salvarEdit(){if(!editSlug)return;var ch={};
 ['nome','email','telefone','whatsapp','cidade','nicho','urlNova','obs','dataProposta','docCliente','endCliente'].forEach(function(k){ch[k]=document.getElementById('m-'+k).value||null});
 ch.status=document.getElementById('m-status').value;
 var v=document.getElementById('m-valor').value;ch.valor=v===''?null:parseFloat(v);
 var mn=document.getElementById('m-manutencao').value;ch.manutencao=mn===''?null:parseFloat(mn);
 ch.pago=parseInt(document.getElementById('m-pago').value);ch.contratoStatus=document.getElementById('m-contratoStatus').value;
 ch.pais=document.getElementById('m-pais').value;
 var slug=editSlug;fecharEdit();salvarOv(slug,ch)}
function setView(v){view=v;render()}
function nav(){
 var fu=fil().filter(function(l){return l.status==='proposta'&&dias(l.dataProposta)>=4});
 var fechadosN=fil().filter(function(l){return l.status==='fechado'}).length;
 var itens=[['geral','Visão geral',null],['pipeline','Pipeline',ativos().length],['clientes','Clientes',fil().length],['sites','Sites',fil().filter(function(l){return['redesenhado','publicado','proposta','respondeu','fechado'].indexOf(l.status)>=0}).length],['comparador','Comparador',fil().filter(function(l){return l.slug&&['redesenhado','publicado','proposta','respondeu','fechado'].indexOf(l.status)>=0}).length],['followup','Follow-ups',fu.length],['cobertura','Cobertura',cobFil().length],['contratos','Contratos',fechadosN],['financeiro','Financeiro',null],['config','Configurações',null]];
 document.getElementById('nav').innerHTML=itens.map(function(i){return '<button class="'+(view===i[0]?'on':'')+'" onclick="setView(\''+i[0]+'\')">'+T(i[1])+(i[2]!==null?'<span class="qt">'+i[2]+'</span>':'')+'</button>'}).join('');
 document.getElementById('titulo').textContent=T(itens.filter(function(i){return i[0]===view})[0][1]);
 document.getElementById('sw-pais').innerHTML=['todos','BR','US'].map(function(p){return '<button class="'+(PAIS===p?'on'+(p==='US'?' us':p==='BR'?' br':''):'')+'" onclick="setPais(\''+p+'\')">'+(p==='todos'?T('todos'):p==='BR'?'🇧🇷 BR':'🇺🇸 US')+'</button>'}).join('');
 document.getElementById('sw-lang').innerHTML=['pt','en'].map(function(g){return '<button class="'+(LANG===g?'on':'')+'" onclick="setLang(\''+g+'\')">'+g.toUpperCase()+'</button>'}).join('');
 var m=document.getElementById('modo');m.textContent=MODE==='db'?T('banco conectado'):T('modo arquivo');
 document.getElementById('upd').textContent=T('atualizado em')+' '+(D.atualizado||'—');
 document.getElementById('busca').placeholder=T('Buscar cliente, nicho, cidade...');
 var lb=document.getElementById('limpar-ov');if(lb)lb.textContent=T('limpar edições locais');
 var els=document.querySelectorAll('[data-t]');for(var i=0;i<els.length;i++)els[i].textContent=T(els[i].getAttribute('data-t'));
}
function pillStatus(s){return '<span class="pill" style="background:color-mix(in srgb,'+CORES[s]+' 18%,white);color:'+CORES[s]+'">'+T(NOMES[s])+'</span>'}
function acoes(l){var a=[];
 if(l.siteAntigo)a.push('<a href="'+l.siteAntigo+'" target="_blank" title="site que o cliente tem hoje">'+T('antigo')+'</a>');
 if(l.slug&&['redesenhado','publicado','proposta','respondeu','fechado'].indexOf(l.status)>=0){a.push('<a class="novo" href="sites/'+l.slug+'/'+l.slug+'.html" target="_blank" title="o redesign que fizemos">'+T('novo')+'</a>');a.push('<a href="sites/'+l.slug+'/'+l.slug+'-editor.html" target="_blank">'+T('editar site')+'</a>')}
 if(l.urlNova)a.push('<a href="'+l.urlNova+'" target="_blank">'+T('no ar ↗')+'</a>');
 if(l.whatsapp)a.push('<a href="https://wa.me/'+l.whatsapp+'" target="_blank">whatsapp</a>');
 if(l.email&&l.email.indexOf('@')>0)a.push('<a href="mailto:'+l.email+'">'+T('e-mail')+'</a>');
 a.push('<a href="#" onclick="abrirEdit(\''+l.slug+'\');return false">'+T('✎ dados')+'</a>');
 a.push('<a href="#" class="del" onclick="deletar(\''+l.slug+'\');return false">'+T('✕ excluir')+'</a>');
 return '<div class="acoes">'+a.join('')+'</div>'}

function card(l){var f=l.status==='proposta'&&dias(l.dataProposta)>=4?'<span class="tag fup">follow-up '+dias(l.dataProposta)+'d</span>':'';
 return '<div class="card" draggable="true" ondragstart="dragIni(event,\''+l.slug+'\')" ondragend="dragFim(event)" style="--cor:'+CORES[l.status]+'"><div class="nm">'+l.nome+tagPais(l)+f+'</div><div class="mt">'+(l.nota?'★ '+l.nota+' ('+l.avaliacoes+')':'')+(l.cidade?' · '+l.cidade:'')+'</div>'+(l.motivo?'<div class="motivo">'+l.motivo+'</div>':'')+(l.obs?'<div class="mt">'+l.obs+'</div>':'')+(l.valor?'<div class="valor">'+fmtLead(l,'valor')+(l.manutencao?' <span style="color:var(--muted);font-weight:600;font-size:11px">+ '+fmtLead(l,'manutencao')+'/'+T('mês')+'</span>':'')+'</div>':'')+acoes(l)+'</div>'}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function avisoDiag(){
 if(!DIAG||!DIAG.total)return '';
 var n=DIAG.total;
 return '<details class="diag"><summary>'+n+(n===1?' inconsistência encontrada':' inconsistências encontradas')+' entre o banco e a pasta sites/ — clique para ver</summary><ul>'+
  DIAG.problemas.map(function(p){return '<li><b>'+esc(p.tipo)+'</b> '+esc(p.detalhe)+'<i>'+esc(p.sugestao)+'</i></li>'}).join('')+
  '</ul></details>'}
function vGeral(){
 var ls=fil(),at=ativos();
 var props=ls.filter(function(l){return l.status==='proposta'});
 var fu=props.filter(function(l){return dias(l.dataProposta)>=4});
 var fech=ls.filter(function(l){return l.status==='fechado'});
 var receita=somaMoe(fech,'valor');
 var atBR=at.filter(function(l){return moe(l)==='BR'}).length,atUS=at.length-atBR;
 var pot={BR:atBR*700,US:atUS*500};
 var html=avisoDiag();
 html+='<div class="stats">'+[['Leads ativos',at.length,''],['Propostas na rua',props.length,''],['Follow-ups pendentes',fu.length,'ambar'],['Fechados',fech.length,'verde'],['Receita fechada',statMoe(receita),'verde'],['Potencial (R$700 · US$500 /página)',statMoe(pot),'laranja']].map(function(s){return '<div class="stat '+s[2]+'"><div class="n'+(String(s[1]).indexOf('<br>')>=0?' duplo':'')+'">'+s[1]+'</div><div class="l">'+T(s[0])+'</div></div>'}).join('')+'</div>';
 var max=Math.max.apply(null,ORDEM.map(function(s){return ls.filter(function(l){return l.status===s}).length}).concat([1]));
 html+='<div class="painel funil"><h2>'+T('Funil do pipeline')+'</h2>'+ORDEM.map(function(s){var n=ls.filter(function(l){return l.status===s}).length;return '<div class="linha"><span>'+T(NOMES[s])+'</span><div class="barra"><div class="fill" style="width:'+(n/max*100)+'%;background:'+CORES[s]+'"></div></div><b>'+n+'</b></div>'}).join('')+'</div>';
 html+='<div class="painel"><h2>'+T('Follow-ups pendentes (4+ dias sem resposta)')+'</h2>'+(fu.length?fu.map(function(l){return '<div class="fup-item"><b>'+l.nome+tagPais(l)+'</b><span class="dias">'+dias(l.dataProposta)+' '+T('dias')+'</span><span style="color:var(--muted);font-size:12px">'+T('proposta em')+' '+l.dataProposta+'</span>'+(l.whatsapp?'<a style="margin-left:auto;font-size:12px;font-weight:700;color:var(--accent-2)" href="https://wa.me/'+l.whatsapp+'" target="_blank">'+T('chamar no WhatsApp →')+'</a>':'')+'</div>'}).join(''):'<div class="vazio">'+T('Nenhum follow-up pendente. 👌')+'</div>')+'</div>';
 return html}
function vPipeline(){var por={};fil().forEach(function(l){(por[l.status]=por[l.status]||[]).push(l)});
 return '<p class="dica-drag">'+T('Arraste um card para mudar o status — os automáticos (redesenhado, publicado, proposta) o plugin move sozinho; use o arrasto principalmente para <b>Respondeu</b> e <b>Fechado</b>.')+'</p><div class="board">'+ORDEM.concat(['descartado']).map(function(s){var arr=por[s]||[];return '<div class="col" data-st="'+s+'" ondragover="dragSobre(event)" ondragleave="dragSai(event)" ondrop="solta(event,\''+s+'\')"><h3>'+T(NOMES[s])+'<span>'+arr.length+'</span></h3><div class="cards">'+(arr.length?arr.map(card).join(''):'<div class="vazio">'+T('solte aqui')+'</div>')+'</div></div>'}).join('')+'</div>'}
function vClientes(){var ls=fil().slice().sort(function(a,b){var x=a[sortCol]||'',y=b[sortCol]||'';return(x<y?-1:x>y?1:0)*(sortAsc?1:-1)});

var dragSlug=null;
function dragIni(e,slug){dragSlug=slug;e.target.classList.add('arrastando');e.dataTransfer.effectAllowed='move'}
function dragFim(e){e.target.classList.remove('arrastando')}
function dragSobre(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('alvo')}
function dragSai(e){e.currentTarget.classList.remove('alvo')}
function solta(e,st){e.preventDefault();e.currentTarget.classList.remove('alvo');if(!dragSlug)return;

 if(st==='proposta'&&!leads.filter(function(l){return l.slug===dragSlug})[0].dataProposta)ch.dataProposta=new Date().toISOString().slice(0,10);
 salvarOv(dragSlug,ch);dragSlug=null}
